services:
  - type: web
    name: chat-app-web
    runtime: static
    rootDir: mobile
    buildCommand: npm install && npx expo export --platform web
    staticPublishPath: dist
    envVars:
      - key: EXPO_PUBLIC_API_URL
        value: https://chat-app-api.onrender.com
      - key: EXPO_PUBLIC_WS_URL
        value: wss://chat-app-api.onrender.com

  - type: web
    name: chat-app-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn app.main:app --app-dir backend --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chat-app-db
          property: connectionString
      - key: CORS_ALLOW_ORIGINS
        value: https://chat-app-web.onrender.com

databases:
  - name: chat-app-db
    plan: free
    region: oregon
