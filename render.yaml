services:
  - type: web
    name: chat-app-api
    runtime: python
    plan: starter
    region: oregon
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn app.main:app --app-dir backend --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chat-app-db
          property: connectionString
      - key: CORS_ALLOW_ORIGINS
        value: "*"

databases:
  - name: chat-app-db
    plan: basic-256mb
    region: oregon
